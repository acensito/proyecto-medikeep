# Optimización para Xeon 14C/28T
org.gradle.jvmargs=-Xmx6g -XX:+UseParallelGC -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Gestión de hilos (dejando margen para el sistema)
org.gradle.workers.max=20
org.gradle.parallel=true
org.gradle.daemon=true
org.gradle.configureondemand=true
org.gradle.caching=true

# Kotlin & AndroidX
android.useAndroidX=true
android.enableJetifier=false
kotlin.incremental=true
kotlin.compiler.execution.strategy=in-process

# Evita que el demonio de Kotlin consuma RAM extra fuera de Gradle
# Ya que usamos 'in-process', no necesitamos darle mucha RAM al daemon separado
kotlin.daemon.jvm.options=-Xmx1g